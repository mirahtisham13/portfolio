<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0.6" />
    </linearGradient>
  </defs>

  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="31" fill="#0b0f19" />

  <!-- Gradient ring border -->
  <circle cx="32" cy="32" r="30.5" fill="none" stroke="url(#ring)" stroke-width="1.5" />

  <!-- Letter A with gradient fill -->
  <text
    x="32"
    y="44"
    text-anchor="middle"
    font-family="'Inter', 'Segoe UI', Arial, sans-serif"
    font-size="36"
    font-weight="800"
    fill="url(#grad)"
    letter-spacing="-1"
  >A</text>
</svg>